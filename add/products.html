<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm | 2026_! Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-950 text-white">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 glass-nav px-6 py-5">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-12">
                <div onclick="window.location.href='index.html'" class="flex items-center space-x-3 cursor-pointer group">
                    <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-lg flex items-center justify-center rotate-3 group-hover:rotate-12 transition-transform duration-500 shadow-[0_0_20px_rgba(34,211,238,0.5)]">
                        <span class="text-white font-black text-xl italic">26</span>
                    </div>
                    <h1 class="text-2xl font-black tracking-tighter gradient-text">2026_!</h1>
                </div>
                <div class="hidden lg:flex space-x-10 text-[11px] font-black uppercase tracking-[0.2em] text-slate-500">
                    <a href="products.html" class="text-white transition-colors">Sản phẩm</a>
                    <a href="category.html" class="hover:text-white transition-colors">Danh mục</a>
                    <a href="services.html" class="hover:text-white transition-colors">Dịch vụ</a>
                </div>
                <div class="hidden xl:flex search-container">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" placeholder="Tìm kiếm siêu phẩm..." class="search-input" onkeyup="searchProduct(event)">
                </div>
            </div>
            <div id="nav-auth" class="flex items-center space-x-4">
                <button onclick="window.location.href='cart.html'" class="px-6 py-3 bg-white/5 hover:bg-white/10 text-slate-300 font-black uppercase tracking-widest text-[10px] rounded-full border border-white/10 transition-all">Giỏ hàng</button>
                <button onclick="window.location.href='user-login.html'" class="btn-premium">Đăng nhập</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20 min-h-screen">
        <header class="mb-16">
            <span class="text-cyan-400 text-xs font-black uppercase tracking-[0.4em] mb-4 block">Cửa hàng</span>
            <h2 class="text-5xl md:text-7xl font-black tracking-tighter uppercase">TẤT CẢ <span class="gradient-text">SẢN PHẨM</span></h2>
            <p class="text-slate-500 mt-6 max-w-2xl font-medium italic">Khám phá toàn bộ bộ sưu tập thiết bị gaming cao cấp và phụ kiện chính hãng tại 2026_!.</p>
        </header>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
            <!-- Sản phẩm được đổ từ script.js -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white text-slate-700 pt-16 pb-8 border-t border-slate-200 mt-20">
        <div class="container mx-auto px-6 text-center">
            <p class="text-[11px] text-slate-400">© 2026. 2026_! Premium Store. Địa chỉ: 128 Trần Quang Khải, Q.1, TP.HCM.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // script.js will handle the rendering based on the id 'product-grid'
    </script>
</body>
</html>
