<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | 2026_!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-950 text-white min-h-screen">
    <div class="bg-mesh"></div>

    <nav class="sticky top-0 z-50 glass-nav px-6 py-5">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='index.html'"
                class="text-3xl font-black tracking-tighter gradient-text cursor-pointer">2026_!</h1>
            
            <div class="flex items-center space-x-8">
                <div onclick="changeAvatar()" class="flex items-center space-x-3 cursor-pointer group">
                    <img id="user-avatar" src="" class="w-10 h-10 rounded-full border border-white/10 group-hover:border-cyan-400 transition-all object-cover">
                    <span id="user-name" class="text-xs font-black uppercase tracking-widest text-slate-300 group-hover:text-white">Admin</span>
                </div>
                <button onclick="logout()" class="text-[10px] font-black uppercase tracking-widest text-red-500 hover:text-red-400 transition-colors">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            <!-- Form thêm sản phẩm -->
            <div class="lg:col-span-1">
                <div class="glass p-10 rounded-[3rem] border border-white/10 sticky top-32">
                    <h2 class="text-3xl font-black mb-8 tracking-tighter">THÊM <span class="gradient-text">SẢN
                            PHẨM</span></h2>
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Tên sản
                                phẩm</label>
                            <input type="text" id="p-name" placeholder="Ví dụ: Bàn phím cơ..."
                                class="input-premium w-full">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Giá
                                (VNĐ)</label>
                            <input type="text" id="p-price" placeholder="Ví dụ: 1.200.000đ"
                                class="input-premium w-full">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Link ảnh
                                (URL)</label>
                            <input type="text" id="p-img" placeholder="https://unsplash.com/..."
                                class="input-premium w-full">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Danh
                                mục</label>
                            <select id="p-cat" class="input-premium w-full bg-slate-900">
                                <option value="Bàn phím">Bàn phím</option>
                                <option value="Chuột">Chuột</option>
                                <option value="Tai nghe">Tai nghe</option>
                                <option value="Phụ kiện">Phụ kiện</option>
                            </select>
                        </div>
                        <button onclick="handleAdd()" class="btn-premium w-full py-5 text-sm mt-4">Xác nhận
                            thêm</button>
                    </div>
                </div>
            </div>

            <!-- Danh sách sản phẩm -->
            <div class="lg:col-span-2">
                <div class="glass p-10 rounded-[3rem] border border-white/10">
                    <h2 class="text-3xl font-black mb-10 tracking-tighter uppercase">Danh sách <span
                            class="gradient-text">Hiện có</span></h2>
                    <div id="admin-product-list" class="space-y-6">
                        <!-- Sản phẩm sẽ hiện ở đây -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        checkAuth();
        
        async function initAdmin() {
            const user = getCurrentUser();
            if (user) {
                document.getElementById('user-name').innerText = user.name;
                document.getElementById('user-avatar').src = user.avatar;
            }
            await renderAdminList();
        }

        async function renderAdminList() {
            const list = document.getElementById('admin-product-list');
            if (!list) return;

            const currentItems = await getProducts();
            list.innerHTML = '';

            currentItems.forEach(item => {
                list.innerHTML += `
                    <div class="flex items-center justify-between p-6 bg-white/5 rounded-[2rem] border border-white/5 hover:bg-white/10 transition-all">
                        <div class="flex items-center space-x-6">
                            <img src="${item.image}" class="w-20 h-20 object-cover rounded-2xl shadow-lg">
                            <div>
                                <h4 class="font-bold text-lg">${item.name}</h4>
                                <p class="text-cyan-400 font-black text-xs uppercase tracking-widest">${item.price}</p>
                            </div>
                        </div>
                        <button onclick="handleDelete(${item.id})" class="p-4 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl transition-all">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `;
            });
        }

        async function handleAdd() {
            const n = document.getElementById('p-name').value;
            const p = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            const cat = document.getElementById('p-cat').value;

            if (!n || !p || !img) {
                alert("Vui lòng điền đủ thông tin!");
                return;
            }

            if (await addProduct(n, p, img, cat)) {
                alert("Đã thêm sản phẩm thành công!");
                location.reload();
            }
        }

        async function handleDelete(id) {
            if (confirm("Bạn có chắc chắn muốn xóa sản phẩm này?")) {
                if (await deleteProduct(id)) {
                    await renderAdminList();
                }
            }
        }

        async function changeAvatar() {
            const user = getCurrentUser();
            const newUrl = prompt('Dán link ảnh đại diện Admin mới:', user.avatar);
            
            if (newUrl && newUrl !== user.avatar) {
                try {
                    const res = await fetch(`${API_URL}/users/update`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: user.email,
                            name: user.name,
                            avatar: newUrl
                        })
                    });

                    if (res.ok) {
                        const updatedUser = await res.json();
                        localStorage.setItem(SESSION_KEY, JSON.stringify(updatedUser));
                        document.getElementById('user-avatar').src = updatedUser.avatar;
                        alert('Cập nhật ảnh đại diện Admin thành công!');
                    }
                } catch (e) {
                    alert('Lỗi khi cập nhật ảnh!');
                }
            }
        }

        window.onload = initAdmin;
    </script>
</body>

</html>
