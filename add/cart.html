<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng | 2026_!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-slate-950 text-white min-h-screen">
    <div class="bg-mesh"></div>

    <nav class="sticky top-0 z-50 glass-nav px-6 py-5">
        <div class="container mx-auto flex justify-between items-center">
            <h1 onclick="window.location.href='index.html'" class="text-3xl font-black tracking-tighter gradient-text cursor-pointer">2026_!</h1>
            <div class="flex items-center space-x-6">
                <button onclick="window.location.href='products.html'" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-white transition-colors">Tiếp tục mua sắm</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-20 max-w-6xl">
        <h2 class="text-5xl font-black mb-12 tracking-tighter uppercase">GIỎ <span class="gradient-text">HÀNG</span></h2>
        
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Danh sách sản phẩm -->
            <div class="lg:w-2/3 space-y-6" id="cart-items">
                <!-- Sản phẩm trong giỏ sẽ hiện ở đây -->
            </div>

            <!-- Tổng kết đơn hàng -->
            <div class="lg:w-1/3">
                <div class="glass p-10 rounded-[3rem] border border-white/10 sticky top-32">
                    <h3 class="text-2xl font-black mb-8 tracking-tighter uppercase">TỔNG <span class="gradient-text">CỘNG</span></h3>
                    <div class="space-y-4 mb-10">
                        <div class="flex justify-between text-slate-400 font-medium">
                            <span>Tạm tính:</span>
                            <span id="subtotal">0đ</span>
                        </div>
                        <div class="flex justify-between text-slate-400 font-medium">
                            <span>Phí vận chuyển:</span>
                            <span class="text-cyan-400 font-bold uppercase tracking-widest text-[10px]">Miễn phí</span>
                        </div>
                        <div class="h-px bg-white/5 my-6"></div>
                        <div class="flex justify-between text-2xl font-black text-white">
                            <span>Tổng tiền:</span>
                            <span id="total">0đ</span>
                        </div>
                    </div>
                    <button onclick="openGoogleForm()" class="btn-premium w-full py-5 text-sm">THANH TOÁN</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function openGoogleForm() {
            const cart = JSON.parse(localStorage.getItem('2026_CART') || '[]');
            if (cart.length === 0) {
                alert("Giỏ hàng của bạn đang trống!");
                return;
            }

            // 1. Thu thập dữ liệu giỏ hàng
            let itemsNames = [];
            let totalQty = 0;
            let totalVal = 0;

            cart.forEach(item => {
                itemsNames.push(`${item.quantity}x ${item.name}`);
                totalQty += item.quantity;
                const price = parseInt(item.price.replace(/[^\d]/g, ''));
                totalVal += price * item.quantity;
            });

            const itemsString = itemsNames.join(' | ');
            const formattedTotal = new Intl.NumberFormat('vi-VN').format(totalVal) + ' VNĐ';

            // 2. Tạo link Google Form tự động điền
            const baseUrl = "https://docs.google.com/forms/d/e/1FAIpQLSekBZKGwfy9f3j8OK_ldzwm-_RfXke5ZXQjCN_wY7jmAK6dsw/viewform";
            const params = new URLSearchParams({
                "usp": "pp_url",
                "entry.1582369313": itemsString,   // Tên sản phẩm
                "entry.753080658": totalQty.toString(), // Tổng số lượng
                "entry.2126922949": formattedTotal // Tổng tiền
            });

            const googleFormLink = `${baseUrl}?${params.toString()}`;
            
            // 3. Mở tab mới
            window.open(googleFormLink, "_blank");
            
            // 4. Dọn dẹp giỏ hàng
            if(confirm('Đơn hàng đã được tạo sẵn bên Google Form! Bạn hãy điền nốt thông tin giao hàng nhé.\n\nNhấn OK để làm sạch giỏ hàng hiện tại.')) {
                localStorage.removeItem('2026_CART');
                renderCart();
                if (typeof updateCartBadge === 'function') updateCartBadge();
            }
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            const cart = JSON.parse(localStorage.getItem('2026_CART') || '[]');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center glass rounded-[3rem] border border-dashed border-white/10">
                        <p class="text-slate-500 mb-8 font-medium">Giỏ hàng của bạn đang trống.</p>
                        <button onclick="window.location.href='products.html'" class="btn-premium px-10 py-4 text-xs">MUA SẮM NGAY</button>
                    </div>
                `;
                document.getElementById('subtotal').innerText = '0đ';
                document.getElementById('total').innerText = '0đ';
                return;
            }

            let totalVal = 0;
            container.innerHTML = cart.map(item => {
                const price = parseInt(item.price.replace(/[^\d]/g, ''));
                totalVal += price * item.quantity;
                
                return `
                    <div class="flex items-center justify-between p-6 glass rounded-[2.5rem] border border-white/5 hover:border-cyan-500/30 transition-all">
                        <div class="flex items-center space-x-6">
                            <img src="${item.image}" class="w-24 h-24 object-cover rounded-2xl shadow-lg">
                            <div>
                                <h4 class="font-bold text-xl mb-1">${item.name}</h4>
                                <p class="text-cyan-400 font-black text-sm uppercase tracking-widest">${item.price}</p>
                            </div>
                        </div>
                        <div class="flex items-center space-x-6">
                            <div class="flex items-center bg-white/5 rounded-full px-4 py-2 border border-white/10">
                                <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 flex items-center justify-center hover:text-cyan-400 transition-colors">−</button>
                                <span class="mx-4 font-black text-sm w-4 text-center">${item.quantity}</span>
                                <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 flex items-center justify-center hover:text-cyan-400 transition-colors">+</button>
                            </div>
                            <button onclick="removeItem(${item.id})" class="p-4 bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white rounded-2xl transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const formattedTotal = new Intl.NumberFormat('vi-VN').format(totalVal) + 'đ';
            document.getElementById('subtotal').innerText = formattedTotal;
            document.getElementById('total').innerText = formattedTotal;
        }

        function updateQty(id, delta) {
            let cart = JSON.parse(localStorage.getItem('2026_CART') || '[]');
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity < 1) return removeItem(id);
                localStorage.setItem('2026_CART', JSON.stringify(cart));
                renderCart();
            }
        }

        function removeItem(id) {
            let cart = JSON.parse(localStorage.getItem('2026_CART') || '[]');
            cart = cart.filter(i => i.id !== id);
            localStorage.setItem('2026_CART', JSON.stringify(cart));
            renderCart();
        }

        window.onload = renderCart;
    </script>
</body>
</html>
