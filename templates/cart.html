{% extends "layout.html" %}

{% block title %}Giỏ hàng của bạn | 2026_!{% endblock %}

{% block content %}
<main class="max-w-7xl mx-auto px-6 py-24">
    <div class="mb-16">
        <h2 class="text-5xl font-black uppercase tracking-tighter">Giỏ hàng <span class="gradient-text">của bạn</span></h2>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- List Items -->
        <div class="lg:col-span-2 space-y-6" id="cart-items">
            <!-- Load via JS -->
            <div class="p-12 text-center bg-white/5 border border-white/10 rounded-[3rem] text-slate-500">
                Đang tải giỏ hàng...
            </div>
        </div>

        <!-- Summary -->
        <div class="lg:col-span-1">
            <div class="bg-white/5 border border-white/10 rounded-[3rem] p-12 sticky top-32">
                <h3 class="text-2xl font-black mb-8 uppercase tracking-tighter">Tổng đơn hàng</h3>
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between text-slate-400">
                        <span>Tạm tính</span>
                        <span id="subtotal">0đ</span>
                    </div>
                    <div class="flex justify-between text-slate-400">
                        <span>Phí vận chuyển</span>
                        <span>Miễn phí</span>
                    </div>
                    <div class="border-t border-white/10 pt-4 flex justify-between text-white font-black text-xl">
                        <span>Tổng cộng</span>
                        <span id="total" class="gradient-text">0đ</span>
                    </div>
                </div>
                <button onclick="checkout()" class="w-full btn-premium py-5 text-[10px]">Thanh toán ngay</button>
                <p class="text-[9px] text-slate-500 text-center mt-6 uppercase tracking-widest font-bold">Cam kết bảo mật & an toàn</p>
            </div>
        </div>
    </div>
</main>

<script>
    async function loadCart() {
        const cartIds = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('cart-items');
        
        if (cartIds.length === 0) {
            container.innerHTML = `
                <div class="p-20 text-center bg-white/5 border border-white/10 rounded-[4rem]">
                    <div class="text-6xl mb-8">🛒</div>
                    <h3 class="text-2xl font-bold mb-4">Giỏ hàng trống</h3>
                    <p class="text-slate-500 mb-8">Hãy chọn cho mình những món đồ công nghệ ưng ý nhất.</p>
                    <a href="/products" class="btn-premium px-12 py-4 text-[10px]">Tiếp tục mua sắm</a>
                </div>
            `;
            return;
        }

        // Fetch all products to get details
        const res = await fetch('/api/products');
        const allProducts = await res.json();
        
        const cartProducts = allProducts.filter(p => cartIds.includes(p.id));
        let total = 0;

        container.innerHTML = cartProducts.map(p => {
            total += p.price;
            return `
                <div class="flex items-center space-x-8 p-8 bg-white/5 border border-white/10 rounded-[2.5rem] group hover:bg-white/10 transition-all">
                    <div class="w-32 h-32 rounded-2xl overflow-hidden bg-slate-950 flex-shrink-0">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <span class="text-[9px] font-black text-cyan-400 uppercase tracking-widest mb-2 block">${p.category}</span>
                        <h4 class="text-xl font-bold text-white mb-2">${p.name}</h4>
                        <p class="text-slate-500 text-sm line-clamp-1">${p.description}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-white mb-4">${p.price.toLocaleString('vi-VN')}đ</p>
                        <button onclick="removeFromCart(${p.id})" class="text-slate-500 hover:text-red-500 text-[9px] font-black uppercase tracking-widest transition-colors">Gỡ bỏ</button>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('subtotal').innerText = total.toLocaleString('vi-VN') + 'đ';
        document.getElementById('total').innerText = total.toLocaleString('vi-VN') + 'đ';
    }

    function removeFromCart(id) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart = cart.filter(cid => cid !== id);
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
    }

    function checkout() {
        alert('Cảm ơn bạn đã đặt hàng! Chúng tôi sẽ liên hệ sớm nhất.');
        localStorage.removeItem('cart');
        location.href = '/';
    }

    document.addEventListener('DOMContentLoaded', loadCart);
</script>
{% endblock %}
