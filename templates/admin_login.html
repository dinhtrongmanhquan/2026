<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Admin | 2026_!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .gradient-text {
            background: linear-gradient(135deg, #22d3ee, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Glow Effects -->
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-red-500/10 blur-[150px] rounded-full"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] bg-cyan-500/10 blur-[150px] rounded-full"></div>

    <div class="max-w-md w-full glass-panel rounded-[3rem] overflow-hidden shadow-2xl relative z-10">
        <div class="p-10 text-center border-b border-white/5">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter gradient-text">ADMIN<span class="text-white">_!</span></h1>
            <p class="text-gray-500 text-[10px] mt-2 font-black uppercase tracking-[0.3em]">Hệ thống điều khiển tối cao</p>
        </div>
        
        <form action="/admin/login" method="POST" class="p-10 space-y-6">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-2">Tên định danh</label>
                <input type="text" name="username" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl text-white focus:border-cyan-500 outline-none transition-all placeholder-gray-600" placeholder="Username...">
            </div>
            <div>
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-400 mb-3 ml-2">Mật mã bảo mật</label>
                <input type="password" name="password" required class="w-full px-6 py-4 bg-white/5 border border-white/10 rounded-2xl text-white focus:border-cyan-500 outline-none transition-all placeholder-gray-600" placeholder="••••••••">
            </div>
            
            {% if error %}
            <div class="bg-red-500/10 border border-red-500/20 py-3 rounded-xl text-center">
                <p class="text-red-400 text-[10px] font-black uppercase tracking-widest">{{ error }}</p>
            </div>
            {% endif %}
            
            <button type="submit" class="w-full bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-red-500/20 transition-all uppercase text-[11px] tracking-[0.2em] active:scale-95">
                Xác thực truy cập
            </button>
        </form>

        <div class="px-10 pb-10 text-center space-y-4">
            <a href="/admin/register" class="block text-cyan-400 hover:text-cyan-300 text-[10px] font-black uppercase tracking-widest transition-all">Chưa có quyền? Đăng ký tại đây</a>
            <a href="/" class="block text-gray-600 hover:text-gray-400 text-[9px] font-bold uppercase tracking-widest transition-all italic underline">Quay lại vùng an toàn</a>
        </div>
    </div>
</body>
</html>
