<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}2026_! | Gaming Store{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-[#020617] text-[#f8fafc] overflow-x-hidden">
    <!-- Top Bar -->
    <div class="top-bar py-1.5 text-center text-white text-[10px] font-black uppercase tracking-[0.2em]">
        ⚡ <span class="text-[var(--accent)]">Gaming Week:</span> Săn quà RGB cực đỉnh! ⚡
    </div>

    <!-- Consolidated Header -->
    <header class="sticky top-0 z-[100] py-4 px-6 border-b border-white/5 bg-[#0f172a]/80 backdrop-blur-xl">
        <div class="max-w-[1600px] mx-auto flex items-center gap-10">
            <!-- Logo -->
            <a href="/" class="flex-shrink-0">
                <span class="text-2xl font-black italic tracking-tighter uppercase gradient-text">2026<span class="text-[var(--primary)]">_!</span></span>
            </a>

            <!-- Nav Links + Search Container -->
            <div class="flex-1 flex items-center gap-10">
                <!-- Links -->
                <div class="hidden lg:flex items-center space-x-8 text-[11px] font-black uppercase tracking-widest text-gray-400">
                    <a href="/products" class="hover:text-[var(--accent)] transition-colors">Sản phẩm</a>
                    <a href="/products?category=Laptop" class="hover:text-[var(--accent)] transition-colors">Laptop</a>
                    <a href="/products?category=Component" class="hover:text-[var(--accent)] transition-colors">Linh kiện</a>
                    <a href="/products?category=Monitor" class="hover:text-[var(--accent)] transition-colors">Màn hình</a>
                    <a href="/news" class="hover:text-[var(--accent)] transition-colors">Tin tức</a>
                </div>

                <!-- Search -->
                <div class="flex-1 max-w-xl relative group">
                    <input type="text" id="main-search" placeholder="Bạn cần tìm gì?..." 
                        class="w-full bg-white/5 border border-white/10 rounded-full py-2.5 px-6 text-xs outline-none focus:border-[var(--accent)] focus:ring-1 focus:ring-[var(--accent)] transition-all text-white">
                    <button id="search-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-[var(--accent)]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex items-center space-x-8 text-[10px] font-black uppercase tracking-widest">
                <a href="/build-pc" class="flex items-center gap-2 hover:text-[var(--primary)] transition-all bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z" /></svg>
                    <span>Build PC</span>
                </a>
                <a href="/cart" class="flex items-center gap-2 hover:text-[var(--accent)] transition-all relative">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                </a>
                <a href="{% if session.get('user_id') %}/profile{% else %}/auth{% endif %}" class="flex items-center gap-2 hover:text-[var(--accent)] transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    {% if session.get('user_id') %}<span class="text-[9px] font-black">{{ session.get('user_name').split(' ')[-1] }}</span>{% endif %}
                </a>
            </div>
        </div>
    </header>

    <div class="min-h-screen">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer class="py-16 border-t border-white/5 mt-32 bg-[#020617]">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h4 class="text-xl font-black italic mb-4 gradient-text uppercase tracking-widest">2026_! GAMING</h4>
            <p class="text-slate-600 text-[9px] font-bold uppercase tracking-[0.4em]">© 2026 Beyond the Limits. Engineered with Python.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
