<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Control | 2026_!{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ef4444; /* Red Neon */
            --accent: #22d3ee;  /* Cyan Neon */
            --bg-dark: #020617;
            --panel-dark: #0f172a;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark); 
            color: #f8fafc;
        }
        .gradient-text {
            background: linear-gradient(135deg, var(--accent), var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-[var(--bg-dark)]">
    <!-- Sidebar -->
    <aside class="w-72 bg-white/[0.02] border-r border-white/5 flex flex-col h-screen sticky top-0">
        <div class="p-8 text-2xl font-black italic tracking-tighter border-b border-white/5 uppercase">
            2026<span class="text-[var(--primary)]">_!</span> <span class="text-[8px] tracking-[0.3em] block text-gray-500 font-bold mt-1">Admin Panel</span>
        </div>
        <nav class="flex-1 p-6 space-y-3">
            <a href="/admin" class="flex items-center space-x-4 p-4 rounded-2xl bg-white/5 text-[var(--accent)] font-black text-[10px] uppercase tracking-widest shadow-lg shadow-cyan-500/10 transition-all border border-cyan-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" /></svg>
                <span>Quản lý kho</span>
            </a>
            <a href="/admin/news" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-white/5 transition-all text-gray-400 font-bold text-[10px] uppercase tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 4l2 2m0 0l2 2m-2-2l-2 2m2-2l2-2" /></svg>
                <span>Quản lý tin tức</span>
            </a>
            <a href="/admin/profile" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-white/5 transition-all text-gray-400 font-bold text-[10px] uppercase tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                <span>Hồ sơ Admin</span>
            </a>
            <a href="/" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-white/5 transition-all text-gray-400 font-bold text-[10px] uppercase tracking-widest">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                <span>Về trang chủ</span>
            </a>
        </nav>
        <div class="p-6 border-t border-white/5">
            <a href="/admin/logout" class="flex items-center space-x-4 p-4 rounded-2xl hover:bg-red-500/10 text-red-500 font-black text-[10px] uppercase tracking-widest transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                <span>Thoát hệ thống</span>
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden relative">
        <!-- Background Glow -->
        <div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] bg-[var(--primary)]/5 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-[50%] h-[50%] bg-[var(--accent)]/5 blur-[120px] rounded-full"></div>

        <header class="h-20 glass-panel border-b border-white/5 flex items-center justify-between px-10 relative z-10">
            <h1 class="text-xl font-black uppercase tracking-tight gradient-text">{% block header_title %}Dashboard{% endblock %}</h1>
            <div class="flex items-center space-x-6">
                <div class="text-right">
                    <p class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-1">Đang trực tuyến</p>
                    <p class="text-xs font-bold">{{ session.get('admin_user', 'Admin') }}</p>
                </div>
                <div class="w-10 h-10 bg-gradient-to-br from-[var(--primary)] to-[var(--accent)] rounded-2xl flex items-center justify-center text-xs font-black shadow-lg shadow-red-500/20">AD</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-10 relative z-10">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
