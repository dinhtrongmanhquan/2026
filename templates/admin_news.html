{% extends "admin_layout.html" %}

{% block title %}Quản lý tin tức | 2026_!{% endblock %}
{% block header_title %}Trung tâm tin tức{% endblock %}

{% block content %}
<div class="glass-panel rounded-[2rem] overflow-hidden shadow-2xl">
    <div class="p-8 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
        <div>
            <h2 class="font-black text-lg uppercase tracking-tight">Danh sách bài viết</h2>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mt-1">Quản lý nội dung tin tức Gaming</p>
        </div>
        <button onclick="openNewsModal()" class="bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-500 hover:to-emerald-700 text-white text-[10px] font-black uppercase tracking-widest px-8 py-4 rounded-2xl flex items-center space-x-3 transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            <span>Đăng tin mới</span>
        </button>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead class="bg-white/5 text-[9px] font-black uppercase tracking-[0.2em] text-gray-400">
                <tr>
                    <th class="px-8 py-5">Ảnh bìa</th>
                    <th class="px-8 py-5">Tiêu đề</th>
                    <th class="px-8 py-5">Tóm tắt</th>
                    <th class="px-8 py-5">Ngày đăng</th>
                    <th class="px-8 py-5 text-right">Thao tác</th>
                </tr>
            </thead>
            <tbody id="admin-news-list" class="divide-y divide-white/5">
                <!-- Load via JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modal Thêm Tin Tức -->
<div id="news-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden z-[100] flex items-center justify-center p-6">
    <div class="glass-panel w-full max-w-2xl rounded-[3rem] p-10 relative shadow-2xl border border-white/10">
        <h2 class="text-3xl font-black mb-8 uppercase tracking-tighter gradient-text">Nội dung bài viết</h2>
        
        <form id="news-form" class="space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2 block">Tiêu đề bài viết</label>
                    <input type="text" id="news-title" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-[var(--accent)] transition-all" placeholder="Nhập tiêu đề hấp dẫn...">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 block">Tóm tắt ngắn</label>
                    <textarea id="news-summary" required rows="2" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-[var(--accent)] transition-all" placeholder="Một vài dòng giới thiệu về bài viết..."></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 block">Nội dung chi tiết</label>
                    <textarea id="news-content" required rows="6" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-[var(--accent)] transition-all" placeholder="Viết nội dung bài viết tại đây..."></textarea>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 block">Link ảnh bìa</label>
                        <input type="text" id="news-image" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-[var(--accent)] transition-all" placeholder="https://...">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase tracking-widest text-gray-400 mb-2 block">Ngày hiển thị</label>
                        <input type="text" id="news-date" required class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white outline-none focus:border-[var(--accent)] transition-all" value="{{ 23 }}/04/2026">
                    </div>
                </div>
            </div>

            <div class="flex space-x-4 pt-6">
                <button type="button" onclick="closeNewsModal()" class="flex-1 bg-white/5 hover:bg-white/10 text-white font-black text-[10px] uppercase tracking-widest py-5 rounded-2xl transition-all border border-white/10">Hủy</button>
                <button type="submit" class="flex-1 bg-gradient-to-r from-emerald-600 to-emerald-800 hover:from-emerald-500 hover:to-emerald-700 text-white font-black text-[10px] uppercase tracking-widest py-5 rounded-2xl transition-all shadow-lg shadow-emerald-500/20 active:scale-95">Đăng bài ngay</button>
            </div>
        </form>
    </div>
</div>

<script>
    async function loadNews() {
        const res = await fetch('/api/news');
        const news = await res.json();
        const list = document.getElementById('admin-news-list');
        list.innerHTML = news.map(n => `
            <tr class="hover:bg-white/[0.02] transition-all">
                <td class="px-8 py-6">
                    <img src="${n.image}" class="w-20 h-12 object-cover rounded-lg border border-white/10">
                </td>
                <td class="px-8 py-6 font-bold text-sm max-w-xs truncate">${n.title}</td>
                <td class="px-8 py-6 text-gray-500 text-xs max-w-xs truncate">${n.summary}</td>
                <td class="px-8 py-6">
                    <span class="text-[10px] font-black text-gray-400 uppercase tracking-widest">${n.date}</span>
                </td>
                <td class="px-8 py-6 text-right">
                    <button onclick="deleteNews(${n.id})" class="text-gray-500 hover:text-red-500 transition-all p-2 hover:bg-red-500/10 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </td>
            </tr>
        `).join('');
    }

    function openNewsModal() {
        document.getElementById('news-modal').classList.remove('hidden');
    }

    function closeNewsModal() {
        document.getElementById('news-modal').classList.add('hidden');
    }

    document.getElementById('news-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            title: document.getElementById('news-title').value,
            summary: document.getElementById('news-summary').value,
            content: document.getElementById('news-content').value,
            image: document.getElementById('news-image').value,
            date: document.getElementById('news-date').value
        };

        const res = await fetch('/api/news', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            closeNewsModal();
            loadNews();
            document.getElementById('news-form').reset();
        }
    });

    async function deleteNews(id) {
        if (confirm('Xóa bài viết này?')) {
            const res = await fetch(`/api/news/${id}`, { method: 'DELETE' });
            if (res.ok) loadNews();
        }
    }

    loadNews();
</script>
{% endblock %}
